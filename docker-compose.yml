name: "sass-analytics"

services:
  timescaledb:
    image: timescale/timescaledb:latest-pg16
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: password
      POSTGRES_DB: analytics
    ports:
      - "5432:5432"

  redpanda:
    image: redpandadata/redpanda:latest
    command:
      - redpanda
      - start
      - --mode dev-container
      # Expose separate internal and external Kafka listeners so host-based
      # clients do not receive container-only broker addresses in metadata.
      - --kafka-addr
      - internal://0.0.0.0:9092,external://0.0.0.0:19092
      - --advertise-kafka-addr
      - internal://redpanda:9092,external://localhost:19092
    ports:
      - "19092:19092" # Port for external connections (e.g., your IDE, GUI)
      - "9092:9092" # Port for internal connections within Docker
      - "9644:9644" # Admin API (useful for debugging)
