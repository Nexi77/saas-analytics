name: "sass-analytics"

services:
  timescaledb:
    image: timescale/timescaledb:latest-pg16
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: password
      POSTGRES_DB: analytics
    ports:
      - "5432:5432"

  redpanda:
    image: redpandadata/redpanda:latest
    command:
      - redpanda
      - start
      - --mode dev-container
    ports:
      - "19092:19092" # Port for external connections (e.g., your IDE, GUI)
      - "9092:9092" # Port for internal connections within Docker
      - "9644:9644" # Admin API (useful for debugging)
